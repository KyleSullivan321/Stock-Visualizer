name: Refresh data snapshot

on:
  schedule:
    # every 15 min, 13:30–20:00 UTC (US market hours ~9:30am–4pm ET), Mon–Fri.
    # cron has no step within an hour cleanly, so list the quarters:
    - cron: "0,15,30,45 14-19 * * 1-5"
    - cron: "30,45 13 * * 1-5"
    - cron: "0 20 * * 1-5"
  workflow_dispatch: {}   # allow manual runs

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python fetch_data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Update data snapshot [skip ci]"
          git push
