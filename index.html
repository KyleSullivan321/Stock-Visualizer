<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Heatmap</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#0e0f13; --panel:#15171d; --line:#262a33; --text:#e6e8ec; --dim:#8b909c;
    --accent:#4a8cff;
  }
  * { box-sizing: border-box; }
  body { margin:0; font:13px/1.4 -apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

  header {
    display:flex; gap:10px; align-items:center; height:52px; padding:0 16px;
    background:linear-gradient(180deg,#16181f,#101116); border-bottom:1px solid var(--line);
    position:absolute; inset:0 0 auto 0; z-index:5;
  }
  header h1 { font-size:15px; margin:0; font-weight:650; letter-spacing:.2px; display:flex; align-items:center; gap:8px; }
  header h1::before { content:""; width:9px; height:9px; border-radius:2px; background:linear-gradient(135deg,#22c55e,#ef4444); }
  input {
    background:#0c0d11; border:1px solid var(--line); color:var(--text);
    padding:8px 11px; border-radius:7px; flex:1; min-width:200px; font-size:13px; outline:none;
  }
  input:focus { border-color:var(--accent); }
  button {
    background:var(--accent); border:1px solid transparent; color:#fff; font-weight:600;
    padding:8px 16px; border-radius:7px; cursor:pointer; font-size:13px;
  }
  button:hover { filter:brightness(1.1); }
  #status { color:var(--dim); font-size:12px; white-space:nowrap; }
  .icon-btn { background:#0c0d11; border:1px solid var(--line); color:var(--dim); padding:8px 10px; border-radius:7px; cursor:pointer; line-height:1; }
  .icon-btn:hover { color:var(--text); border-color:#3a3f4a; filter:none; }

  #map { position:absolute; inset:52px 0 0 0; }

  /* loading overlay */
  #loading { position:absolute; inset:52px 0 0 0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:var(--bg); z-index:4; color:var(--dim); }
  #loading.on { display:flex; }
  .spinner { width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* legend */
  #legend {
    position:absolute; left:12px; bottom:12px; z-index:3; display:flex; align-items:center; gap:14px;
    background:rgba(18,20,26,.85); backdrop-filter:blur(6px); border:1px solid var(--line);
    border-radius:9px; padding:8px 12px; font-size:11px; color:var(--dim);
  }
  #legend .swatches { display:flex; align-items:center; gap:2px; }
  #legend .sw { width:16px; height:14px; }
  #legend b { color:#cdd3de; font-weight:600; }
  #legend .sep { width:1px; height:20px; background:var(--line); }
  .group { position:absolute; overflow:hidden; }
  .group > .label {
    position:absolute; top:0; left:0; right:0; padding:3px 7px; font-size:10px; font-weight:600;
    color:#aeb6c7; background:rgba(0,0,0,.30); text-transform:uppercase; letter-spacing:.7px;
    white-space:nowrap; pointer-events:none; z-index:1;
  }
  .tile {
    position:absolute; display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; text-align:center; cursor:pointer; color:#fff;
    border-radius:3px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.35);
    transition:box-shadow .1s, transform .06s;
  }
  .tile:hover { box-shadow:inset 0 0 0 1px rgba(255,255,255,.85); z-index:2; }
  .tile:focus-visible { outline:2px solid #fff; outline-offset:-2px; z-index:3; }
  .tile .sym { font-weight:750; letter-spacing:.3px; text-shadow:0 1px 2px rgba(0,0,0,.45); }
  .tile .pct { opacity:.95; text-shadow:0 1px 2px rgba(0,0,0,.45); }
  .tile.failed { background:repeating-linear-gradient(45deg,#23262e,#23262e 6px,#1b1e25 6px,#1b1e25 12px) !important; color:var(--dim); cursor:default; }
  .tile.failed:hover { box-shadow:inset 0 0 0 1px rgba(0,0,0,.35); }

  /* ---- detail panel ---- */
  #scrim { position:fixed; inset:0; background:rgba(0,0,0,.45); opacity:0; pointer-events:none; transition:opacity .18s; z-index:9; }
  #scrim.open { opacity:1; pointer-events:auto; }
  #panel {
    position:fixed; top:0; right:0; bottom:0; width:min(420px,92vw); background:var(--panel);
    border-left:1px solid var(--line); transform:translateX(100%); transition:transform .22s ease;
    z-index:10; display:flex; flex-direction:column; box-shadow:-12px 0 40px rgba(0,0,0,.45);
  }
  #panel.open { transform:none; }
  #panel .head { padding:18px 20px 14px; border-bottom:1px solid var(--line); }
  #panel .close { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--dim); font-size:22px; padding:0 4px; cursor:pointer; }
  #panel .close:hover { color:var(--text); }
  #panel .sym-lg { font-size:24px; font-weight:700; }
  #panel .name { color:var(--dim); font-size:13px; margin-top:2px; }
  #panel .price-row { margin-top:10px; display:flex; align-items:baseline; gap:10px; }
  #panel .price { font-size:20px; font-weight:600; }
  #panel .chg { font-size:15px; font-weight:600; padding:2px 8px; border-radius:6px; }
  #panel .chg.up { background:rgba(34,197,94,.15); color:#4ade80; }
  #panel .chg.down { background:rgba(239,68,68,.15); color:#f87171; }
  #panel .body { padding:18px 20px; overflow-y:auto; flex:1; }
  #panel h3 { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--dim); margin:22px 0 8px; }
  #panel h3:first-child { margin-top:0; }
  #panel p { margin:0; color:#c3c8d2; font-size:13px; }

  .rating { display:flex; align-items:center; gap:12px; }
  .rating .badge { font-size:15px; font-weight:700; padding:6px 14px; border-radius:8px; text-transform:capitalize; }
  .rating .scale { font-size:12px; color:var(--dim); }
  .bar { height:6px; border-radius:3px; background:#23262e; margin-top:8px; overflow:hidden; }
  .bar > i { display:block; height:100%; border-radius:3px; }

  .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; }
  .stats div { display:flex; justify-content:space-between; border-bottom:1px solid #20232b; padding-bottom:5px; }
  .stats span:first-child { color:var(--dim); }

  .news a { display:block; color:#cdd3de; text-decoration:none; padding:9px 0; border-bottom:1px solid #20232b; font-size:13px; }
  .news a:hover { color:var(--accent); }
  .news small { color:var(--dim); display:block; margin-top:2px; }
  .muted { color:var(--dim); font-style:italic; }
</style>
</head>
<body>
<header>
  <h1>Stock Heatmap</h1>
  <input id="tickers" placeholder="comma-separated tickers" aria-label="Tickers">
  <button id="go">Load</button>
  <button id="refresh" class="icon-btn" title="Refresh prices" aria-label="Refresh">&#10227;</button>
  <span id="status"></span>
</header>
<div id="map" role="list" aria-label="Stock heatmap"></div>

<div id="loading"><div class="spinner"></div><div>Loading market data…</div></div>

<div id="legend">
  <span>Size = <b>move magnitude</b></span>
  <span class="sep"></span>
  <span class="swatches">
    <span class="sw" style="background:hsl(2 85% 38%)"></span>
    <span class="sw" style="background:hsl(2 45% 30%)"></span>
    <span class="sw" style="background:hsl(140 45% 30%)"></span>
    <span class="sw" style="background:hsl(140 85% 38%)"></span>
  </span>
  <span>&minus;&nbsp;<b>% change</b>&nbsp;+</span>
</div>

<div id="scrim"></div>
<aside id="panel">
  <div class="head">
    <button class="close" title="Close">&times;</button>
    <div class="sym-lg" id="p-sym"></div>
    <div class="name" id="p-name"></div>
    <div class="price-row"><span class="price" id="p-price"></span><span class="chg" id="p-chg"></span></div>
  </div>
  <div class="body" id="p-body"></div>
</aside>

<script>
const DEFAULT = "GOOG,AAPL,MSFT,TSLA,SPCX,PLTR,NOW,TSM,QQQ,SPY,VRT,CRWV,LLY,CEG,VST,META,RKLB,QCOM,MU";

// ponytail: hardcoded sector map. No classification API exists for free; a lookup table is the lazy correct answer.
// Add tickers here to group them; anything unknown lands in "Other".
const SECTOR = {
  GOOG:"Technology", MSFT:"Technology", META:"Technology", NOW:"Technology", PLTR:"Technology",
  AAPL:"Technology", TSM:"Semiconductors", QCOM:"Semiconductors", MU:"Semiconductors",
  TSLA:"Consumer / Auto", SPCX:"Aerospace", RKLB:"Aerospace",
  LLY:"Healthcare",
  CEG:"Energy / Utilities", VST:"Energy / Utilities", VRT:"Energy / Utilities", CRWV:"Technology",
  QQQ:"ETFs", SPY:"ETFs",
};

const $map = document.getElementById("map");
const $status = document.getElementById("status");
const $tickers = document.getElementById("tickers");
$tickers.value = DEFAULT;

document.getElementById("go").onclick = run;
document.getElementById("refresh").onclick = run;
$tickers.addEventListener("keydown", e => { if (e.key === "Enter") run(); });
window.addEventListener("resize", () => { if (lastData) render(lastData); });

let lastData = null;

async function run() {
  const syms = $tickers.value.split(",").map(s => s.trim().toUpperCase()).filter(Boolean);
  if (!lastData) document.getElementById("loading").classList.add("on");
  $status.textContent = "loading…";
  const results = await Promise.all(syms.map(fetchQuote));
  document.getElementById("loading").classList.remove("on");
  // keep failed tickers visible as hatched tiles instead of dropping them silently
  const all = results.map(r => isFinite(r.pct) ? r : { ...r, failed: true });
  const okCount = all.filter(r => !r.failed).length;
  const failed = all.filter(r => r.failed).map(r => r.sym);
  const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  $status.innerHTML = `<b style="color:#cdd3de">${okCount}</b> loaded · ${time}`
    + (failed.length ? ` · <span title="no data">${failed.length} unavailable</span>` : "");
  lastData = all;
  render(all);
}

// Data layer. Local `python server.py` provides /quote,/summary,/news (fast, reliable).
// On GitHub Pages there's no server, so fall back to a public CORS proxy hitting Yahoo directly.
const HAS_SERVER = location.port === "8000" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
const Y = "https://query1.finance.yahoo.com";
const PROXY = u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`;

async function yget(localPath, yahooUrl) {
  const url = HAS_SERVER ? localPath : PROXY(yahooUrl);
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function fetchQuote(sym) {
  try {
    const j = await yget(`/quote?s=${encodeURIComponent(sym)}`,
      `${Y}/v8/finance/chart/${encodeURIComponent(sym)}?range=1d&interval=1d`);
    const m = j?.chart?.result?.[0]?.meta;
    if (!m) return { sym, pct: NaN };
    const price = m.regularMarketPrice, prev = m.chartPreviousClose;
    if (!isFinite(price) || !isFinite(prev) || !prev) return { sym, pct: NaN };
    return { sym, pct: (price - prev) / prev * 100, price };
  } catch {
    return { sym, pct: NaN };
  }
}

// ---- treemap ----
function render(data) {
  $map.innerHTML = "";
  const W = $map.clientWidth, H = $map.clientHeight;
  if (!data.length || W < 10) return;

  // group by sector; tile weight = |pct| (floor so 0% moves still show)
  const groups = {};
  for (const d of data) {
    const sec = SECTOR[d.sym] || "Other";
    const weight = d.failed ? 0.5 : Math.abs(d.pct) + 0.4;
    (groups[sec] ||= []).push({ ...d, weight });
  }
  const groupList = Object.entries(groups)
    .map(([name, items]) => ({ name, items, weight: items.reduce((s, x) => s + x.weight, 0) }))
    .sort((a, b) => b.weight - a.weight);

  // layout groups across the whole canvas, then tiles within each group
  squarify(groupList, 0, 0, W, H, g => g.weight).forEach(g => {
    const el = div("group", g.x, g.y, g.w, g.h);
    el.append(Object.assign(document.createElement("div"), { className: "label", textContent: g.node.name }));
    $map.append(el);
    const pad = 14; // room for label
    squarify(g.node.items, g.x, g.y + pad, g.w, Math.max(1, g.h - pad), t => t.weight)
      .forEach(t => drawTile(t));
  });
}

function drawTile(t) {
  const d = t.node;
  const el = div("tile", t.x, t.y, t.w, t.h);
  const area = t.w * t.h;
  const fs = Math.max(8, Math.min(t.w / 4, t.h / 3, 24));

  if (d.failed) {
    el.className = "tile failed";
    if (area > 120) el.innerHTML = `<span class="sym" style="font-size:${Math.min(fs,11)}px">${d.sym}</span>`;
    el.title = `${d.sym} — no data`;
    $map.append(el);
    return;
  }

  el.style.background = colorFor(d.pct);
  const arrow = d.pct >= 0 ? "▲" : "▼";                 // colorblind-safe direction cue
  const pctTxt = `${d.pct >= 0 ? "+" : ""}${d.pct.toFixed(2)}%`;
  if (area > 600) {
    el.innerHTML = `<span class="sym" style="font-size:${fs}px">${d.sym}</span>` +
                   `<span class="pct" style="font-size:${fs * 0.62}px">${arrow} ${pctTxt}</span>`;
  } else if (area > 120) {
    el.innerHTML = `<span class="sym" style="font-size:${Math.min(fs,11)}px">${d.sym}</span>`;
  }
  el.title = `${d.sym}  ${arrow} ${pctTxt}  ·  click for analysis`;
  el.setAttribute("role", "listitem");
  el.tabIndex = 0;
  el.setAttribute("aria-label", `${d.sym}, ${d.pct >= 0 ? "up" : "down"} ${Math.abs(d.pct).toFixed(2)} percent. Open analysis.`);
  el.onclick = () => openPanel(d);
  el.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openPanel(d); } };
  $map.append(el);
}

// green up / red down. Magnitude → richer & slightly brighter (saturates at ±5%).
function colorFor(pct) {
  const m = Math.min(Math.abs(pct) / 5, 1);
  const hue = pct >= 0 ? 140 : 2;
  const sat = 30 + 55 * m;                            // flat grey-ish near 0, vivid on big moves
  const light = 26 + 12 * m;                          // big move = a touch brighter, not washed out
  return `hsl(${hue} ${sat}% ${light}%)`;
}

function div(cls, x, y, w, h) {
  const el = document.createElement("div");
  el.className = cls;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
  return el;
}

// squarified treemap. Returns [{node,x,y,w,h}]. weightFn maps node->number.
function squarify(nodes, x, y, w, h, weightFn) {
  const items = nodes.map(n => ({ node: n, weight: weightFn(n) })).filter(n => n.weight > 0);
  const total = items.reduce((s, n) => s + n.weight, 0);
  if (!total) return [];
  const scale = (w * h) / total;
  items.forEach(n => n.area = n.weight * scale);

  const out = [];
  let rx = x, ry = y, rw = w, rh = h;
  let row = [], i = 0;
  while (i < items.length) {
    const short = Math.min(rw, rh);
    const next = items[i];
    if (row.length === 0 || worst(row, short) >= worst([...row, next], short)) {
      row.push(next); i++;
    } else {
      [rx, ry, rw, rh] = layoutRow(row, rx, ry, rw, rh, out);
      row = [];
    }
  }
  if (row.length) layoutRow(row, rx, ry, rw, rh, out);
  return out;

  function worst(row, short) {
    const sum = row.reduce((s, n) => s + n.area, 0);
    const max = Math.max(...row.map(n => n.area));
    const min = Math.min(...row.map(n => n.area));
    const s2 = sum * sum, sh2 = short * short;
    return Math.max(sh2 * max / s2, s2 / (sh2 * min));
  }
  function layoutRow(row, rx, ry, rw, rh, out) {
    const sum = row.reduce((s, n) => s + n.area, 0);
    const horizontal = rw >= rh;
    const thick = sum / (horizontal ? rh : rw); // along the long axis
    let off = horizontal ? ry : rx;
    for (const n of row) {
      const len = n.area / thick;
      if (horizontal) { out.push({ node: n.node, x: rx, y: off, w: thick, h: len }); }
      else            { out.push({ node: n.node, x: off, y: ry, w: len, h: thick }); }
      off += len;
    }
    return horizontal
      ? [rx + thick, ry, rw - thick, rh]
      : [rx, ry + thick, rw, rh - thick];
  }
}

// ---- detail panel ----
const $panel = document.getElementById("panel");
const $scrim = document.getElementById("scrim");
const $ = id => document.getElementById(id);
document.querySelector("#panel .close").onclick = closePanel;
$scrim.onclick = closePanel;
document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

function closePanel() { $panel.classList.remove("open"); $scrim.classList.remove("open"); }

let panelToken = 0;
async function openPanel(d) {
  const token = ++panelToken;
  $("p-sym").textContent = d.sym;
  $("p-name").textContent = "";
  $("p-price").textContent = d.price != null ? `$${(+d.price).toFixed(2)}` : "";
  const up = d.pct >= 0;
  const chg = $("p-chg");
  chg.textContent = `${up ? "+" : ""}${d.pct.toFixed(2)}%`;
  chg.className = "chg " + (up ? "up" : "down");
  $("p-body").innerHTML = `<p class="muted">Loading analysis…</p>`;
  $panel.classList.add("open"); $scrim.classList.add("open");

  // Summary needs Yahoo's crumb (server-only); on Pages it 401s, so we degrade gracefully.
  const [summary, news] = await Promise.all([
    yget(`/summary?s=${encodeURIComponent(d.sym)}`,
      `${Y}/v10/finance/quoteSummary/${encodeURIComponent(d.sym)}?modules=assetProfile,financialData,summaryDetail,defaultKeyStatistics,price`)
      .catch(() => ({})),
    yget(`/news?s=${encodeURIComponent(d.sym)}`,
      `${Y}/v1/finance/search?q=${encodeURIComponent(d.sym)}&newsCount=5&quotesCount=0`)
      .catch(() => ({})),
  ]);
  if (token !== panelToken) return; // user clicked another tile meanwhile

  const r = summary?.quoteSummary?.result?.[0] || {};
  renderPanel(d, r, news?.news || []);
}

function renderPanel(d, r, news) {
  const fin = r.financialData || {}, prof = r.assetProfile || {},
        sd = r.summaryDetail || {}, ks = r.defaultKeyStatistics || {}, price = r.price || {};
  const num = v => (v && typeof v === "object") ? v.raw : v;
  const fmt = v => v == null || !isFinite(v) ? "—" : v;
  const money = v => v == null || !isFinite(v) ? "—" : `$${(+v).toFixed(2)}`;
  const longName = price.longName || price.shortName;
  if (longName) $("p-name").textContent = longName;

  // "Why it's moving" — honest version: factual price-action line + headlines below.
  const up = d.pct >= 0, dir = up ? "up" : "down";
  const why = `${d.sym} is trading ${dir} ${Math.abs(d.pct).toFixed(2)}% today`
    + (num(sd.fiftyTwoWeekHigh) ? `, against a 52-week range of ${money(num(sd.fiftyTwoWeekLow))}–${money(num(sd.fiftyTwoWeekHigh))}.` : ".")
    + " See the headlines below for likely catalysts.";

  // buy rating
  const mean = num(fin.recommendationMean);          // 1=strong buy … 5=sell
  const key = fin.recommendationKey;
  const target = num(fin.targetMeanPrice);
  const ratingHtml = mean ? ratingBlock(key, mean, target, num(price.regularMarketPrice) ?? d.price) : "";

  const stat = (label, val) => `<div><span>${label}</span><span>${val}</span></div>`;
  const statsHtml = `<div class="stats">
    ${stat("Market cap", bigNum(num(price.marketCap)))}
    ${stat("P/E (ttm)", fmt(round(num(sd.trailingPE))))}
    ${stat("52w high", money(num(sd.fiftyTwoWeekHigh)))}
    ${stat("52w low", money(num(sd.fiftyTwoWeekLow)))}
    ${stat("Avg target", money(target))}
    ${stat("Beta", fmt(round(num(sd.beta ?? ks.beta))))}
  </div>`;

  const newsHtml = news.length ? `<div class="news">` + news.slice(0, 5).map(n =>
      `<a href="${n.link}" target="_blank" rel="noopener">${esc(n.title)}<small>${esc(n.publisher || "")}</small></a>`
    ).join("") + `</div>` : `<p class="muted">No recent headlines found.</p>`;

  const summaryText = prof.longBusinessSummary
    ? `<p>${esc(trim(prof.longBusinessSummary, 600))}</p>` : `<p class="muted">No company summary available.</p>`;

  $("p-body").innerHTML =
    (ratingHtml ? `<h3>Buy rating · analyst consensus</h3>${ratingHtml}` : "") +
    `<h3>Why it's moving</h3><p>${why}</p>` +
    `<h3>Recent headlines</h3>${newsHtml}` +
    `<h3>Key stats</h3>${statsHtml}` +
    `<h3>About</h3>${summaryText}` +
    `<p class="muted" style="margin-top:18px;font-size:11px">Data: Yahoo Finance. Not investment advice.</p>`;
}

// maps Yahoo's 1–5 mean to a label + color + bar
function ratingBlock(key, mean, target, price) {
  const labels = [[1.5,"Strong Buy","#16a34a"],[2.5,"Buy","#65a30d"],[3.5,"Hold","#d97706"],[4.5,"Underperform","#ea580c"],[99,"Sell","#dc2626"]];
  const [, label, color] = labels.find(([t]) => mean <= t);
  const pct = Math.max(0, Math.min(100, (5 - mean) / 4 * 100)); // 5→0%, 1→100%
  const upside = (target && price) ? ((target - price) / price * 100) : null;
  return `<div class="rating">
      <span class="badge" style="background:${color}22;color:${color}">${label}</span>
      <span class="scale">consensus ${mean.toFixed(2)}/5${
        upside != null ? ` · ${upside >= 0 ? "+" : ""}${upside.toFixed(0)}% to target` : ""}</span>
    </div>
    <div class="bar"><i style="width:${pct}%;background:${color}"></i></div>`;
}

const round = v => v == null ? v : Math.round(v * 100) / 100;
function bigNum(v) {
  if (!v) return "—";
  const u = [["T",1e12],["B",1e9],["M",1e6]];
  for (const [s, n] of u) if (v >= n) return `$${(v / n).toFixed(2)}${s}`;
  return `$${v}`;
}
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
